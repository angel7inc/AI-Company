# _company/charter/outbound-action-policy.md の承認記録スキーマに準拠。
# businesses/instagram/content/templates/carousel-ceo-approval-template.yaml(sample_only)を
# 実データ化したものであり、テンプレート自体ではない。
#
# 本記録は「execute(Instagram投稿の実行)」に対する承認記録であり、outbound-action-policy.md
# のdefault-deny原則に基づき、有効な承認記録が確認できない限り実際の投稿(execute)は禁止される。
#
# 2026-07-18更新(第9Batch): CEOによるInstagramプロフィールの人間確認(target_account確定)、
# 第9章ハッシュタグの正式採用、旧6枚目のリスク受容による最終公開判断を経て、
# approval_status: approved_for_manual_execution へ更新した(第1投稿1件のみを対象)。
#
# 2026-07-18更新(第10Batch): 会社全体の公開運用モデルが「CEOによる手動投稿」から
# 「CEO最終承認後のシステム実行」へ正式に統一された(docs/runbooks/human-approval-system-publication.md参照)。
# コンテンツ承認(画像・キャプション・ハッシュタグ・対象アカウント・プロフィール導線・6枚目の使用判断)は
# 変更していない。変更するのは実行方式のみである。第9Batchのapproved_for_manual_execution/
# ready_for_manual_executionは削除せず、下記supersededフィールドで置き換え関係を明示する。
# Instagram投稿実行アダプタ(publisher/connector)は本更新時点で未実装であり、
# connector_status: not_configured / execution_status: blocked_on_publisher_connector とする。
#
# 2026-07-18更新(第11Batch): CEOがFable 5への個別委任による経営判断提案を採用し、
# 投稿コネクタ実装を所定トリガーまで延期する一方、最初のInstagram投稿5件に限り
# CEOによる投稿操作のみを許可する限定的パイロット運用方式を正式決定した。
# system-managed実行モデル(第10Batch)は目標(permanent_target_model)として維持し撤回しない。
# 第10Batchのapproved_awaiting_system_execution/blocked_on_publisher_connectorは削除せず、
# 下記supersededフィールドで置き換え関係を明示する。承認対象は今回の第1投稿1件のみ。
# Claude Code自身はInstagramへの投稿を実行しない。

