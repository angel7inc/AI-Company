# KPI入力Batch テンプレート(項目定義のみ。実在する入力Batchではない)
# 正本としての実Batchは _company/analytics/local/entry-batches/ 配下に置く想定だが、
# 今回はテンプレートのみを作成し、実ファイルは作成しない。
# _company/analytics/local/entry-batches/ はGit管理対象外とする(.gitignore参照)。
# 用語・状態値の定義は docs/runbooks/kpi-data-entry-and-validation.md を正本として参照する。

schema_version: 1
sample_only: true
do_not_import: true

entry_batch_id: null
brand_id: null

source_system: null
source_reference: null            # 非公開URL等の実値は入れない
source_period_start: null
source_period_end: null
source_timezone: null

collected_at: null
recorded_at: null
recorded_by: null
entry_method: null                 # manual / imported / calculated

source_extract_present: false
evidence_ids: []

expected_observation_count: null
recorded_observation_count: null

duplicate_check_status: null
reconciliation_status: null
validation_status: null

# KPI定義版トレーサビリティ(2026-07-14追加、schema_versionは据え置き。詳細は
# docs/runbooks/kpi-definition-observation-traceability.md参照)
definition_resolution_status: null
all_definitions_resolved: false     # Batch内に未解決観測値が1件でもあればtrueにしない
unresolved_observation_ids: []
definition_references: []           # 実在する参照は入れない(空テンプレート)

human_review_required: null
human_review_status: null
ceo_review: null
external_reporting_approved: false

observation_ids: []

errors: []
warnings: []
notes: null
