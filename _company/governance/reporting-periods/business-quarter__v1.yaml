# 四半期期間定義(承認済み、初回登録)
# 構造定義は_company/governance/templates/reporting-period-definition-template.yamlを参照する。
# 用語・状態値の定義はdocs/runbooks/business-time-and-reporting-period-governance.mdを正本として参照する。
# human_review_status・ceo_reviewの許容値はRunbook「2.1 レビュー状態値」を正本として参照する(2026-07-16 CEO決定)。承認日時の正本は事業時刻ポリシー(business-time-policy__v1.yaml)およびGitコミット履歴とする。
# 暦年基準の四半期であり、会計四半期としては使用しない。

schema_version: 1

period_definition_id: business_quarter
policy_version: 1

period_type: quarterly
boundary_timezone: Asia/Tokyo

start_time_local: "00:00:00"
end_time_local: "00:00:00"
start_inclusive: true
end_inclusive: false

week_start_day: null
iso_week_used: false

month_start_rule: first_day_of_quarter_at_00_00
quarter_definition: calendar_year_q1_q2_q3_q4
year_start_rule: january_1_at_00_00
fiscal_year_start_month: null

cumulative_value_allowed: false
partial_period_allowed: false
late_arriving_data_rule: "確定済み・locked済み期間へは自動反映せず、人間レビューおよび訂正要否確認を必要とする"

effective_from: "2026-07-16T00:00:00+09:00"
effective_to: null
active: true

human_review_required: true
human_review_status: approved
ceo_review: approved

notes: "暦年基準。Q1: 1月1日00:00以上4月1日00:00未満。Q2: 4月1日00:00以上7月1日00:00未満。Q3: 7月1日00:00以上10月1日00:00未満。Q4: 10月1日00:00以上翌年1月1日00:00未満。会計四半期としては使用しない。"
