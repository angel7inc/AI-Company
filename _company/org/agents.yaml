# 全エージェント台帳(SSOT: Single Source of Truth)
# 新しいエージェントを追加するときは、このリストに1件追加するだけでOKです。
#
# layer: core(経営・COO) / shared(事業横断) / business(事業専属)
# status: draft(検討中) / active(稼働中) / paused(休止中) / retired(廃止)
# division: layer:sharedのエージェントをグルーピングする任意ラベル(例: creative, brand-quality, conversion, revenue, intelligence)。
#           旧division名 competitor-intelligence / traffic はPhase7でintelligenceに統合済み(shared-competitor-intelligence / shared-traffic-intelligence)。
#           definition が _company/agents/ 配下を指すエージェント(management/automation)については必須(2026-07-12、Automation Division新設時にFable5判断で必須化)。
#           独立台帳(divisions.yaml)は本ファイルが50行を超えるか、Divisionが独自予算/オーナーを持つまで新設しない(2026-07-12 Fable5判断)。
# brand: 所属ブランドのid(brands.yamlと一致)。shared層のエージェントは実行時に対象ブランドを受け取るため null とする。
#        (2026-07-12修正) SEO Division(business_unit: seo)の9エージェントは、設計意図に反しtomo-angel7に固定されていたためnullへ修正。
#        Instagram(business_unit: instagram)はカルーセルテンプレート等ブランドごとに持続する成果物を扱うため、意図的にbrand固定のまま。

