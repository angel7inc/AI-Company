# 全ブランド台帳(SSOT: Single Source of Truth)
# 新しいブランドを追加するときは、このリストに1件追加し、_company/brands/{ブランドID}/ フォルダを作成します。
#
# status: planned(準備中・台帳登録のみ) / independent-pending(既存ブランドからの分離検討中) / active(運用中) / retired(運営終了。削除せず保持)
# ブランド追加ルール(命名規則・追加条件・ライフサイクル・必須ファイル・共有/非共有)は _company/brands/README.md を正本とする。
# owner: このブランドの管理責任者(役割。通常はCOO)
# human_owner: 最終意思決定を行う人間(通常はCEO)
# primary_ai / secondary_ai: 主に使用するAIツール(ベンダーロックイン回避のため、いつでも入れ替え可能な参照値として管理)
# created_by: 初回登録者 / updated_at: 最終更新日 / version: 変更のたびに1つずつ増やす版数

