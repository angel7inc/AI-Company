# 全商品台帳(SSOT: Single Source of Truth)
# Product Division(product-service-designer)が管理する。Brand Layer(brands.yaml)とは独立した別軸のライフサイクルを持つ。
# ブランドは永続的(数ブランド規模)、商品は流動的(将来100ブランド・1000商品規模)という性質差のため、あえて別ファイルにしている。
#
# lifecycle_status: Idea(着想) / Planning(企画) / Developing(開発中) / Beta(試験提供) / Released(正式提供) / Growing(成長中) / Mature(成熟・安定提供) / Retired(終了)
#   通常はIdea→Planning→Developing→Beta→Released→Growing→Matureの順に進むが、どの段階からでもRetiredへ直接遷移してよい(企画中止・早期終了等)。
#   Retiredになっても行は削除せず保持する(Knowledge/SOP/Brandと同じ「消さずstatusを変える」原則)。
#
# id: {ブランドID}-{商品スラッグ} の形式にする(例: tomo-angel7-reading-basic)。1000商品規模でのID衝突を避けるため、ブランドIDを必ず含める。
# brand_id: 所属ブランドのid(brands.yamlのidと一致)。Productからブランドへの参照のみを持ち、Brand側からの逆参照(brands.yaml側にproduct一覧を持つ等)は行わない。
# category: reading(個人鑑定) / school(スクール) / course-material(教材) / membership(会員サイト) / phone-fortune(電話占い) / ai-tool(AIツール) / book(書籍) / subscription(サブスク)
#   新しい種類が必要な場合はこの一覧に追記する(重複防止のため、既存カテゴリに近いものがあれば流用する)。
# owner: 通常COO(実務管理はproduct-service-designer)
#
# metrics: 商品の「健康状態」への参照情報のみを保持するブロック(2026-07-12改定)。
#   products.yamlは完全な定義台帳とし、時間とともに変化する動的な実績数値(revenue_jpy・CVR・CPA・ROAS・LTV・
#   customer_satisfaction・review_score等)は一切保存しない。実績の正本は_company/finance/actuals/、
#   分析結果の正本はrevenue-analytics/product-quality-standardsの出力(_company/kpi/またはreports/)である。
#   このファイルの構造(スキーマ)・metrics配下の参照情報はproduct-service-designerが所有する。
#   - finance_source: 実績金額の正本の場所(_company/finance/actuals/{brand_id}/)
#   - report_reference: 集計・分析レポートへの参照パス(_company/kpi/またはreports/配下。未作成時はnull)
#   - computed_by: 分析指標・品質指標の計算責任者(複数可)
#   - last_computed_at: 最終算出日(参照先レポートの更新日)

products:
  - id: tomo-angel7-personal-reading
    name: 個人鑑定(包括商品)
    brand_id: tomo-angel7
    category: reading
    lifecycle_status: Released
    owner: COO
    created_by: COO
    created_at: "2026-07-12"
    updated_at: "2026-07-12"
    version: 1
    notes: "LINE・ココナラ・Instagram DM等は別商品ではなく、本商品の異なるchannelとして扱う(_company/finance/actuals/のchannel欄で区別)。価格別・プラン別の商品分割は、実際の商品構成が確定してから追加する。"
    metrics:
      finance_source: "_company/finance/actuals/tomo-angel7/"
      report_reference: null
      computed_by: [revenue-analytics, product-quality-standards]
      last_computed_at: null

