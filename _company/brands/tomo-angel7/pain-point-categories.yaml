# Tomo_Angel7 顧客の悩みカテゴリ一覧
# brand-brief.md「6. 顧客の悩み(カテゴリ)」から参照されるSSOT
# 新しいカテゴリを追加する場合は、この一覧に1行追記するだけでよい(brand-brief.md本体の編集は不要)
#
# status: draft(仮説段階、docs/phase2-instagram-design.mdの想定に基づく)
#         validated(intelligence-consumerの調査で裏付けが取れた段階)

pain_point_categories:
  - id: relationship-anxiety
    name: 恋愛関係での不安
    description: 相手の気持ちが分からない、関係が今後どうなるか分からない不安
    status: draft

  - id: self-understanding-lack
    name: 自己理解不足
    description: 自分が本当は何を求めているか分からない、自己肯定感の低さ
    status: draft

  - id: loneliness
    name: 「分かってもらえない」孤独感
    description: 周囲に本音を相談しづらい、共感してもらえないと感じる孤独感
    status: draft

  # 以下3件は2026-07-13、Instagram投稿パイロット運用(businesses/instagram/content/pilot-scope.md参照)のために追加。
  # 既存3件(relationship-anxiety/self-understanding-lack/loneliness)は変更していない。恋愛以外の悩みへの検証目的の追加であり、
  # パイロットの成否に応じて継続・修正・削除を再判断する(pilot-scope.mdの停止条件を参照)。
  # 【重要】本3件は通常運用で自動的に使用可能な正規カテゴリとしては扱わない。pilot-scope.md(status: experimental)で
  # 定義された実験範囲内でのみ利用可能とし、パイロット外の投稿・企画でこれらのIDを正規カテゴリとして参照しないこと。
  - id: interpersonal-boundary-fatigue
    name: 対人関係での気遣い疲れ
    description: 家族・友人・職場等で他人に気を遣いすぎて、心身が疲れてしまう
    status: draft

  - id: work-future-uncertainty
    name: 仕事・将来への不安
    description: 仕事の先行きや将来のキャリア・生活が見えず、漠然とした不安を抱える
    status: draft

  - id: life-choice-paralysis
    name: 人生の選択における停滞感
    description: 人生の岐路で何を選べばよいか分からず、決断できずに動けなくなる
    status: draft

created_at: "2026-07-12"
updated_at: "2026-07-13"
